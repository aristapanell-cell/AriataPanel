  url: http://www.gstatic.com/generate_204
  interval: 300
  lazy: true
  proxies: *id001
- name: ⚖️ ARISTA BALANCE
  type: load-balance
  strategy: consistent-hashing
  url: http://www.gstatic.com/generate_204
  interval: 300
  lazy: true
  proxies: *id001
- name: 🎯 ARISTA CORE
  type: select
  proxies:
